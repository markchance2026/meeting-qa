<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>会议制度问答助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:16px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-shrink:0}
.header h1{font-size:17px;font-weight:600}
.header p{font-size:12px;opacity:.85;margin-top:4px}
.messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.6;word-break:break-word}
.msg.user{align-self:flex-end;background:#1a73e8;color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.msg.bot pre{background:#f5f5f5;padding:8px 12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:13px}
.msg.bot code{background:#f0f0f0;padding:1px 6px;border-radius:4px;font-size:13px}
.msg.bot ul,.msg.bot ol{margin:8px 0 8px 20px}
.msg.bot li{margin:4px 0}
.typing{align-self:flex-start;background:#fff;padding:12px 20px;border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:none}
.typing span{display:inline-block;width:8px;height:8px;border-radius:50%;background:#999;margin:0 2px;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-6px)}}
.input-area{flex-shrink:0;padding:12px 16px;background:#fff;border-top:1px solid #e8e8e8;display:flex;gap:10px;align-items:flex-end;box-shadow:0 -2px 6px rgba(0,0,0,.04)}
.input-area textarea{flex:1;border:1px solid #ddd;border-radius:22px;padding:10px 16px;font-size:15px;resize:none;outline:none;max-height:120px;min-height:40px;line-height:1.5;font-family:inherit}
.input-area textarea:focus{border-color:#1a73e8}
.input-area button{flex-shrink:0;width:42px;height:42px;border:none;border-radius:50%;background:#1a73e8;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s}
.input-area button:active{transform:scale(.92)}
.input-area button:disabled{background:#ccc;cursor:not-allowed}
.welcome{text-align:center;color:#999;padding:40px 20px}
.welcome .icon{font-size:48px;margin-bottom:12px}
.welcome p{font-size:14px;line-height:1.8}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.suggestions button{background:#fff;border:1px solid #1a73e8;color:#1a73e8;padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s}
.suggestions button:active{background:#1a73e8;color:#fff}
.error-msg{text-align:center;color:#e74c3c;padding:8px;font-size:13px}
</style>
</head>
<body>
<div class="header"><h1>会议制度问答助手</h1><p>基于集团线下业务活动上会手册</p></div>
<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="icon"></div>
    <p>你好！我是会议制度问答助手<br>可以帮你解答上会流程、上会比例<br>餐补、住房安排等问题</p>
    <div class="suggestions">
      <button onclick="sendQuick('景区大会的上会比例是多少？')">景区大会上会比例</button>
      <button onclick="sendQuick('餐补核算的标准是什么？')">餐补核算标准</button>
      <button onclick="sendQuick('住房是如何安排的？')">住房安排规则</button>
      <button onclick="sendQuick('如何取消住房？')">取消住房操作</button>
      <button onclick="sendQuick('参会证丢失怎么补打？')">补打参会证</button>
    </div>
  </div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
</div>
<div class="input-area">
  <textarea id="input" rows="1" placeholder="输入你的问题..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>
<script>
let conversationId='';let isSending=false;
function getMsgs(){return document.getElementById('messages')}
function getWelcome(){return document.getElementById('welcome')}
function getTyping(){return document.getElementById('typing')}
function getInput(){return document.getElementById('input')}
function getBtn(){return document.getElementById('sendBtn')}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function sendQuick(t){getInput().value=t;sendMessage()}
function fmt(text){let h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/`(.+?)`/g,'<code>$1</code>');h=h.replace(/^[·•\-] (.+)$/gm,'<li>$1</li>');h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');h=h.replace(/((?:<li>.*<\/li>\s*)+)/g,'<ul>$1</ul>');h=h.replace(/\n/g,'<br>');return h}
function addMsg(text,role){const w=getWelcome();if(w)w.style.display='none';const d=document.createElement('div');d.className='msg '+role;d.innerHTML=role==='bot'?fmt(text):text;const t=getTyping();getMsgs().insertBefore(d,t);scrollDown();return d}
function scrollDown(){getMsgs().scrollTop=getMsgs().scrollHeight}
function showTyping(){getTyping().style.display='block';scrollDown()}
function hideTyping(){getTyping().style.display='none'}
function showErr(msg){hideTyping();const e=document.createElement('div');e.className='error-msg';e.textContent=msg;getMsgs().appendChild(e);scrollDown()}
async function sendMessage(){const inp=getInput();const text=inp.value.trim();if(!text||isSending)return;isSending=true;getBtn().disabled=true;inp.value='';inp.style.height='auto';addMsg(text,'user');showTyping();try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,conversation_id:conversationId})});if(!r.ok)throw new Error('HTTP '+r.status);const data=await r.json();if(data.error)throw new Error(data.error);if(data.conversation_id)conversationId=data.conversation_id;hideTyping();addMsg(data.reply,'bot')}catch(e){hideTyping();showErr('请求出错: '+e.message)}finally{isSending=false;getBtn().disabled=false;getInput().focus()}}
</script>
</body>
</html>
